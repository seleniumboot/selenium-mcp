name: Build & Publish JetBrains Plugin

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to the JetBrains Marketplace (requires PUBLISH_TOKEN secret)"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: jetbrains-plugin
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Build plugin
        run: gradle buildPlugin --no-configuration-cache

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: selenium-boot-mcp-plugin
          path: jetbrains-plugin/build/distributions/*.zip

      - name: Publish to JetBrains Marketplace
        if: ${{ inputs.publish }}
        env:
          PUBLISH_TOKEN: ${{ secrets.PUBLISH_TOKEN }}
        run: gradle publishPlugin --no-configuration-cache
